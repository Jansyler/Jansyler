name: Generate 3D Calendar

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Jansyler
          template: classic
          # THIS IS THE MAGIC LINE: It turns off all the broken 0-stats
          base: "" 
          config_timezone: Europe/Prague
          config_theme: tokyonight
          
          # We ONLY keep the 3D Calendar plugin
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
