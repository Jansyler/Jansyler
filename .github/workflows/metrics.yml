name: Generate Metrics Dashboard

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Jansyler
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: Europe/Prague
          
          # Visuals matching your aesthetic
          config_theme: tokyonight
          
          # 1. The Isometric Calendar (The 3D grid from the screenshot)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # 2. Coding Habits (The bar charts showing when you code)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # 3. Languages (The colored bar at the bottom)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
